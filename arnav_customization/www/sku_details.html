<!DOCTYPE html>
<html>
<head>
    <title>SKU Details</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
        }
        img {
            max-width: 200px;
        }
    </style>
</head>
<body>

<div class="card">
    {% if item %}
        <h2>{{ item.item_name }}</h2>
        <img src="{{ image_url }}" />
        <p><b>SKU:</b> {{ item.sku }}</p>
        <p><b>Price:</b> ₹{{ item.selling_price }}</p>
    {% else %}
        <p>{{ message }}</p>
    {% endif %}
</div>

</body>
</html>
